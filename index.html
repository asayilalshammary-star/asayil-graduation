<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دعوة تخرج أصايل</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <section id="coverPage" class="cover-page">
    <div class="cover-box">
      <img src="cover.jpg" id="envelope" alt="Envelope" />
      <p class="click-text">انقر هنا</p>
    </div>
  </section>

  <section id="invitePage" class="invite-page hidden">
    <div class="invite-card">
      <img src="invite.jpg" class="invite-bg" alt="Invitation" />

      <div class="lines-layer">
        <img src="line1.jpg" class="text-img item line1" alt="">
        <img src="line2.jpg" class="text-img item line2" alt="">
        <img src="line3.jpg" class="text-img item line3" alt="">
        <img src="graduate.jpg" class="text-img item graduate" alt="">
        <img src="line5.jpg" class="text-img item line5" alt="">
        <img src="info.jpg" class="text-img item info" alt="">
        <img src="venue.jpg" class="text-img item venue" alt="">

        <a
          href="https://maps.app.goo.gl/68J3agn4vjSPMt9g8?g_st=ic"
          target="_blank"
          class="map-click item"
          aria-label="موقع الحفل">
        </a>
      </div>
    </div>
  </section>

  <audio id="bgMusic" preload="auto">
    <source src="Music.mp4" type="audio/mp4">
  </audio>

  <script src="script.js"></script>
</body>
</html>
